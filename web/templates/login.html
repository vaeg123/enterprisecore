<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — EnterpriseCore AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a;
      --border: #2e3350; --accent: #5b6af5; --text: #e2e8f0;
      --text-muted: #94a3b8; --high: #ef4444; --radius: 10px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: var(--bg); color: var(--text);
           min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 2.5rem; width: 380px; max-width: 95vw; }
    .brand { text-align: center; margin-bottom: 2rem; }
    .brand-name { font-size: 1.4rem; font-weight: 700; color: var(--accent); }
    .brand-sub  { color: var(--text-muted); font-size: .85rem; margin-top: 4px; }
    label { display: block; font-size: .85rem; color: var(--text-muted);
            font-weight: 500; margin-bottom: 6px; }
    input { width: 100%; background: var(--surface2); border: 1px solid var(--border);
            border-radius: 6px; color: var(--text); padding: 10px 14px;
            font-size: .9rem; font-family: inherit; outline: none;
            transition: border-color .15s; margin-bottom: 1.1rem; }
    input:focus { border-color: var(--accent); }
    .btn { width: 100%; padding: 11px; background: var(--accent); color: #fff;
           border: none; border-radius: 6px; font-size: .95rem; font-weight: 600;
           cursor: pointer; transition: opacity .15s; }
    .btn:hover { opacity: .85; }
    .error { background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.3);
             color: var(--high); border-radius: 6px; padding: 10px 14px;
             font-size: .85rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-name">EnterpriseCore AI</div>
      <div class="brand-sub">Legal Operating System</div>
    </div>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <input type="hidden" name="next" value="{{ next }}">
      <div>
        <label>Identifiant</label>
        <input type="text" name="username" autofocus autocomplete="username"
               value="{{ username or '' }}" placeholder="admin">
      </div>
      <div>
        <label>Mot de passe</label>
        <input type="password" name="password" autocomplete="current-password" placeholder="••••••••">
      </div>
      <button type="submit" class="btn">Se connecter</button>
    </form>
  </div>
</body>
</html>
