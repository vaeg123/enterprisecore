# fly.toml — EnterpriseCore on Fly.io
# Docs: https://fly.io/docs/reference/configuration/

app = "enterprisecore-vaeg"
primary_region = "cdg"   # Paris — change to your preferred region

[build]
  dockerfile = "Dockerfile"

[env]
  FLASK_ENV = "production"
  PORT      = "8080"
  API_PORT  = "8081"
  DB_HOST   = "127.0.0.1"
  DB_NAME   = "enterprise_core"
  DB_USER   = "ecuser"
  # Secrets (DB_PASSWORD, FLASK_SECRET_KEY, OPENAI_API_KEY, ANTHROPIC_API_KEY, DEEPSEEK_API_KEY)
  # are set via: fly secrets set KEY=value

[[services]]
  protocol    = "tcp"
  internal_port = 8080

  [[services.ports]]
    port     = 80
    handlers = ["http"]

  [[services.ports]]
    port     = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type       = "connections"
    hard_limit = 25
    soft_limit = 20

  [[services.tcp_checks]]
    interval      = "15s"
    timeout       = "2s"
    grace_period  = "30s"

  [[services.http_checks]]
    interval      = "30s"
    timeout       = "5s"
    grace_period  = "30s"
    method        = "GET"
    path          = "/login"

[mounts]
  source      = "ec_mysql_data"
  destination = "/data"
